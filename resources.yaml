apiVersion: v1
kind: ServiceAccount
metadata:
  name: namespace-controller-sa
  namespace: namespace-controller

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: namespace-controller-role
rules:
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get","list","watch"]
- apiGroups: [""]
  resources: ["resourcequotas"]
  verbs: ["create"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: namespace-controller-role-binding
subjects:
- kind: ServiceAccount
  name: namespace-controller-sa
  namespace: namespace-controller
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: namespace-controller-role
  apiGroup: rbac.authorization.k8s.io
